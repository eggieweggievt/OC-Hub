<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#fdf4fa" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="OC Hub" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" href="982602-holographicowner.png" />
<link rel="apple-touch-icon" href="982602-holographicowner.png" />
<title>OC Hub 🦄</title>
<!-- =========================================================================
  OC Hub — a gentle candy-pastel home for original characters, for Eggie 🦄
  Characters · lore · story arcs · ships · idea wall · per-OC ref boards.
  Built on the Eggie-OS foundation: one file, vanilla JS, Supabase storage.
  Shares the same Supabase project as the main OS; ALL data here lives under
  oc-prefixed keys on the sentinel daily_logs row (log_date 2000-01-01).
========================================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ---- candy-unicorn theme: token NAMES match the main OS, hues are hers ---- */
  :root {
    --bg:#fdf4fa; --bg2:#eef4fd; --panel:#fff; --panel-soft:#fdf8fe;
    --line:#f4ddef; --line-2:#e6def6; --ink:#5a4663; --ink-soft:#8b7795; --muted:#b5a4c0;
    --pink:#f49fc6; --pink-deep:#e574ab; --lav:#a795e6; --lav-deep:#8a76d6;
    --mint:#82d4c3; --peach:#f0cc88; --rose:#f2879c; --blue:#9ec5f2; --blue-deep:#6f9fd8;
    --shadow:0 6px 22px rgba(190,140,200,.13); --shadow-sm:0 2px 8px rgba(190,140,200,.10);
    --r:18px; --sans:"Quicksand",ui-rounded,"SF Pro Rounded",system-ui,sans-serif; --display:"Fredoka",var(--sans);
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  /* never let a stray wide element widen the page — keeps `main` truly centered (iPad portrait fix) */
  html,body{width:100%;max-width:100%;overflow-x:hidden;}
  main{overflow-x:clip;}
  body{background:var(--bg);background-image:radial-gradient(80% 50% at 100% 0%,#fbdff0 0%,transparent 60%),radial-gradient(70% 50% at 0% 0%,#ddeafc 0%,transparent 55%),radial-gradient(60% 40% at 50% 100%,#efe6fb 0%,transparent 60%);background-attachment:fixed;color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;font-weight:500;-webkit-font-smoothing:antialiased;min-height:100vh;}
  /* her unicorn-sky art, muted, behind everything */
  body::after{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;background:url("design_03.png") center/cover no-repeat;}
  body.calm::after{display:none;}
  /* cute icon helpers */
  .ti{width:15px;height:15px;vertical-align:-3px;border-radius:4px;margin-right:2px;}
  .brand-crown{height:24px;width:auto;vertical-align:-5px;filter:drop-shadow(0 1px 3px rgba(167,149,230,.4));}
  .deco{height:36px;width:auto;image-rendering:auto;}
  body.calm .deco{display:none;}
  h1,h2,h3{font-family:var(--display);font-weight:600;margin:0;}
  .muted{color:var(--muted);} .soft{color:var(--ink-soft);} .pink{color:var(--pink-deep);} .lav{color:var(--lav-deep);} .mint{color:var(--mint);}
  .num{font-variant-numeric:tabular-nums;} a{color:var(--lav-deep);}
  button{font-family:inherit;cursor:pointer;font-weight:600;} input,textarea,select{font-family:inherit;font-weight:500;}
  .label{font-size:10.5px;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  /* panels = frosted cakes: white card + a thin candy-stripe icing line on top */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px;position:relative;overflow:hidden;}
  .panel::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;opacity:.55;pointer-events:none;background:repeating-linear-gradient(-45deg,var(--pink) 0 12px,var(--blue) 12px 24px,var(--peach) 24px 36px,var(--lav) 36px 48px);}
  body.calm .panel::before{display:none;}
  .inp{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;padding:9px 12px;color:var(--ink);font-size:13px;width:100%;outline:none;}
  .inp:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(244,159,198,.14);}
  textarea.inp{resize:vertical;}
  .btn{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;color:var(--ink-soft);font-size:12px;padding:7px 14px;transition:.15s;}
  .btn:hover{border-color:var(--pink);color:var(--pink-deep);}
  .btn-pink{background:linear-gradient(135deg,var(--pink),var(--lav));color:#fff;border:none;box-shadow:inset 0 2px 0 rgba(255,255,255,.5),var(--shadow-sm);}  /* gummy gloss */
  .btn-pink:hover{filter:brightness(1.05);color:#fff;}
  .pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;letter-spacing:.03em;box-shadow:inset 0 1px 0 rgba(255,255,255,.6);}  /* gumdrop sheen */
  .pill-pink{background:#fde3f0;color:var(--pink-deep);} .pill-lav{background:#e9e3fb;color:var(--lav-deep);}
  .pill-mint{background:#ddf4ee;color:#2f9d83;} .pill-peach{background:#faf0d4;color:#bc8f33;} .pill-gray{background:#f3ecf4;color:var(--muted);}
  .pill-blue{background:#ddebfa;color:var(--blue-deep);}
  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:repeating-linear-gradient(45deg,#f6cfe5 0 8px,#dcd2f5 8px 16px);border-radius:9px;}
  #rail{display:flex;align-items:center;justify-content:space-between;padding:10px 22px;position:sticky;top:0;z-index:20;background:rgba(255,255,255,.78);backdrop-filter:blur(12px);border-bottom:2px solid transparent;border-image:linear-gradient(90deg,var(--blue),var(--lav),var(--pink),var(--peach)) 1;gap:10px;flex-wrap:wrap;}
  /* frosting drip: a scalloped white edge hanging under the rail 🍰 */
  #rail::after{content:"";position:absolute;left:0;right:0;bottom:-9px;height:9px;pointer-events:none;background:radial-gradient(circle at 9px -3px, rgba(255,255,255,.85) 9px, transparent 10px) repeat-x;background-size:18px 9px;}
  .brand{font-family:var(--display);font-size:18px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px;}
  .brand-name{background:linear-gradient(120deg,var(--blue-deep),var(--lav-deep) 45%,var(--pink-deep));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;letter-spacing:.02em;font-size:17px;}
  nav{display:flex;gap:4px;flex-wrap:wrap;}
  .tab{font-size:13px;padding:6px 13px;border-radius:999px;color:var(--ink-soft);border:none;background:none;}
  .tab.active{background:linear-gradient(135deg,#fde3f0,#e9e3fb);color:var(--pink-deep);} .tab:hover{color:var(--pink-deep);}
  #rail .right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .chip{font-size:11px;padding:4px 10px;border-radius:999px;border:1.5px solid var(--line-2);color:var(--muted);background:#fff;text-decoration:none;}
  .chip.on{color:var(--mint);border-color:#bfe9dd;background:#f0fbf8;} .chip.demo{color:var(--lav-deep);border-color:#ddd2f6;background:#f6f1ff;}
  main{padding:18px;max-width:1380px;margin:0 auto;}
  /* ---- modular dashboard (port — keep verbatim) ---- */
  .grid-modular{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));grid-auto-rows:8px;grid-auto-flow:row dense;gap:0 16px;}
  .home-widget{position:relative;transition:transform .24s cubic-bezier(.2,.8,.25,1);}
  .home-widget.resizing{transition:none;}
  #nav .tab{transition:transform .2s cubic-bezier(.2,.8,.25,1);}
  .drag-clone{position:fixed;left:0;top:0;z-index:9999;pointer-events:none;border-radius:18px;box-shadow:0 16px 38px rgba(140,90,150,.34);opacity:.97;}
  .home-widget.dragsrc,#nav .tab.dragsrc{visibility:hidden;}
  .home-widget.reordering{outline:2px dashed var(--lav);outline-offset:3px;border-radius:18px;}
  .home-widget.resizing{outline:2px dashed var(--pink);outline-offset:3px;border-radius:18px;}
  .home-widget.min .panel,.home-widget.min section{max-height:50px;overflow:hidden;}
  .home-tools{position:absolute;top:9px;right:9px;z-index:6;display:flex;gap:3px;}
  .home-tools button{border:none;background:rgba(255,255,255,.6);border-radius:7px;font-size:11px;line-height:1;color:#a394b6;cursor:pointer;padding:4px 6px;opacity:.4;touch-action:none;user-select:none;}
  .home-tools .home-grip{cursor:grab;}
  .home-widget:hover .home-tools button,.home-tools button:hover{opacity:.95;}
  .home-resize{position:absolute;right:3px;bottom:3px;z-index:6;border:none;background:rgba(255,255,255,.6);border-radius:7px;font-size:12px;line-height:1;color:#a394b6;cursor:nwse-resize;padding:2px 5px;opacity:.4;touch-action:none;user-select:none;}
  .home-widget:hover .home-resize,.home-resize:hover{opacity:.95;}
  .home-add{border:2px dashed var(--line);border-radius:16px;background:rgba(255,255,255,.4);color:var(--lav-deep);font-size:13px;cursor:pointer;min-height:44px;max-height:48px;grid-column:1/-1;grid-row:span 8;margin-top:2px;}
  body.locked .home-tools,body.locked .home-resize,body.locked .home-add{display:none!important;}
  #nav .tab{touch-action:none;user-select:none;-webkit-user-select:none;}
  #nav .tab.reordering{opacity:.55;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
  .soft-card{background:var(--panel-soft);border:1px solid var(--line);border-radius:14px;padding:12px;}
  .seg{display:inline-flex;background:#f7eef8;border-radius:999px;padding:3px;gap:2px;flex-wrap:wrap;}
  .seg button{border:none;background:none;border-radius:999px;padding:5px 11px;font-size:12px;color:var(--ink-soft);}
  .seg button.on{background:#fff;color:var(--pink-deep);box-shadow:var(--shadow-sm);}
  .hbtn{text-align:left;border:1.5px solid var(--line-2);border-radius:13px;padding:9px 11px;background:#fff;transition:.15s;}
  .hbtn.done{border-color:#bfe9dd;background:#f1fbf8;} .hbtn:hover{border-color:var(--pink);}
  .check{width:18px;height:18px;border-radius:7px;border:2px solid var(--line-2);background:#fff;flex:none;} .check.on{background:var(--mint);border-color:var(--mint);}
  .chiptog{border:1.5px solid var(--line-2);border-radius:999px;padding:7px 14px;background:#fff;color:var(--ink-soft);font-size:13px;display:inline-flex;align-items:center;gap:8px;}
  .chiptog.on{background:#fde3f0;border-color:var(--pink);color:var(--pink-deep);}
  details.acc{border:2px solid var(--line-2);border-radius:14px;background:var(--panel);box-shadow:var(--shadow-sm);margin-bottom:12px;overflow:hidden;}  /* matches the character-sheet boxes */
  details.acc>summary{list-style:none;cursor:pointer;padding:13px 16px;font-family:var(--display);font-size:15px;color:var(--ink);display:flex;align-items:center;justify-content:space-between;gap:8px;}
  details.acc>summary::-webkit-details-marker{display:none;}
  details.acc>summary::after{content:"▸";color:var(--muted);transition:transform .2s;}
  details.acc[open]>summary::after{transform:rotate(90deg);}
  details.acc>.acc-body{padding:2px 16px 16px;}
  .bar{height:7px;border-radius:999px;background:#f2e6f4;overflow:hidden;} .bar>span{display:block;height:100%;border-radius:999px;background:repeating-linear-gradient(45deg,var(--pink) 0 8px,var(--lav) 8px 16px);}  /* candy-cane progress */
  .spark{display:flex;align-items:flex-end;gap:2px;height:34px;}
  .spark span{flex:1;background:linear-gradient(180deg,var(--pink),var(--lav));border-radius:3px 3px 0 0;min-height:2px;opacity:.85;}
  .modal-bg{position:fixed;inset:0;background:rgba(98,68,104,.32);z-index:50;display:flex;align-items:center;justify-content:center;padding:18px;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;}
  th{text-align:left;padding:8px 6px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);font-weight:700;}
  td{padding:8px 6px;font-size:13px;border-bottom:1px solid var(--line);}
  .hidden{display:none!important;} .grow{flex:1;}
  /* ---- gentle page transition ---- */
  #view.view-enter{ animation:viewIn .4s cubic-bezier(.22,.61,.36,1) both; }
  #view.view-enter > *{ animation:panelIn .44s cubic-bezier(.22,.61,.36,1) both; }
  #view.view-enter > *:nth-child(2){ animation-delay:.06s; }
  #view.view-enter > *:nth-child(3){ animation-delay:.12s; }
  #view.view-enter > *:nth-child(4){ animation-delay:.18s; }
  #view.view-enter > *:nth-child(n+5){ animation-delay:.22s; }
  @keyframes viewIn{ from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:none;} }
  @keyframes panelIn{ from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:none;} }
  /* ---- character gallery ---- */
  .oc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
  .oc-card{border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:var(--shadow-sm);padding:14px;cursor:pointer;transition:transform .15s,border-color .15s;display:flex;flex-direction:column;gap:8px;}
  .oc-card:hover{border-color:var(--pink);transform:translateY(-2px);}
  .oc-ava{width:54px;height:54px;border-radius:999px;display:grid;place-items:center;font-size:27px;color:#fff;flex:0 0 auto;box-shadow:inset 0 3px 6px rgba(255,255,255,.55),var(--shadow-sm);}  /* gumball gloss */
  .oc-dots{display:flex;gap:4px;} .oc-dots span{width:14px;height:14px;border-radius:999px;border:1px solid rgba(0,0,0,.08);}
  .oc-banner{height:130px;border-radius:12px;background-size:cover;background-position:center top;background-color:#f6effa;}
  .oc-sw{display:flex;border-radius:12px;overflow:hidden;border:1px solid var(--line);height:54px;}
  .oc-sw>button{flex:1;border:none;cursor:pointer;position:relative;transition:flex .15s;color:#fff;font:inherit;font-size:10px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;text-shadow:0 1px 2px rgba(0,0,0,.45);}
  .oc-sw>button:hover{flex:1.4;}
  /* ---- kanban (story arcs) ---- */
  .kanban{display:grid;grid-template-columns:repeat(5,minmax(160px,1fr));gap:10px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;}
  @media(max-width:1100px){.kanban{grid-template-columns:repeat(5,190px);}}
  .kcol{background:var(--bg2);border:1.5px dashed var(--line-2);border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:8px;min-height:130px;}  /* candy-jar columns */
  .citem{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;padding:9px;transition:.15s;cursor:grab;box-shadow:var(--shadow-sm);}
  .citem:hover{border-color:var(--pink);} .citem.dim{opacity:.35;} .citem.hit{border-color:var(--lav);}
  .drop-hot{outline:2px dashed var(--lav-deep);outline-offset:-2px;}
  .file-hot{outline:3px dashed var(--pink)!important;outline-offset:-3px;border-radius:14px;background-color:rgba(244,159,198,.08)!important;}
  .drag-ghost{border-radius:8px;}
  /* ---- idea wall + inspiration vault ---- */
  .idea-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .idea-card{position:relative;border-radius:4px 14px 14px 14px;padding:12px 12px 32px;font-size:12.5px;line-height:1.5;min-height:86px;box-shadow:0 3px 10px rgba(140,90,150,.14);word-break:break-word;color:#5f4a64;}
  .idea-card .ic-tools{position:absolute;bottom:5px;right:6px;display:flex;gap:2px;opacity:.7;}
  .ic-tools button{border:none;background:rgba(255,255,255,.55);border-radius:6px;font-size:11px;cursor:pointer;padding:2px 5px;color:#6b5a70;}
  .inspo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
  .inspo-card{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;display:flex;flex-direction:column;box-shadow:0 3px 10px rgba(140,90,150,.10);}
  .inspo-card.done{opacity:.55;}
  .inspo-thumb{height:104px;background:#f1e9fa center/cover no-repeat;display:grid;place-items:center;font-size:26px;}
  .inspo-body{padding:9px 11px;display:flex;flex-direction:column;gap:4px;flex:1;}
  /* ---- character art gallery (with artist credits) ---- */
  .gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .gal-card{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;display:flex;flex-direction:column;box-shadow:0 3px 10px rgba(140,90,150,.10);}
  .gal-thumb{aspect-ratio:1;background:#f1e9fa center/cover no-repeat;display:grid;place-items:center;font-size:24px;cursor:zoom-in;}
  .gal-body{padding:7px 9px;display:flex;flex-direction:column;gap:2px;}
  .oc-quote{font-family:var(--display);font-size:14px;color:var(--lav-deep);font-style:italic;margin-top:6px;}
  /* ---- discord-style profile hero ---- */
  .oc-hero{position:relative;border-radius:var(--r) var(--r) 0 0;overflow:visible;margin:-16px -16px 0;}
  .oc-hero-banner{height:190px;border-radius:var(--r) var(--r) 0 0;background-size:cover;background-position:center;}
  .oc-hero-ava{position:absolute;left:20px;bottom:-34px;border:5px solid #fff;border-radius:999px;box-shadow:var(--shadow-sm);}
  .oc-hero-ava .oc-ava{display:grid;}
  .oc-hero-body{padding:44px 4px 0;}
  @media(max-width:700px){.oc-hero-banner{height:130px;}}
  /* ---- D&D-style character sheet editor ---- */
  .sheet{max-width:980px;margin:0 auto;display:flex;flex-direction:column;gap:18px;}
  .sheet-box{border:2px solid var(--line-2);border-radius:14px;padding:18px 14px 14px;position:relative;background:rgba(255,255,255,.92);}
  .sheet-box>h4{position:absolute;top:-9px;left:14px;margin:0;background:#fff;padding:0 9px;font-family:var(--display);letter-spacing:.14em;font-size:11px;color:var(--lav-deep);text-transform:uppercase;border-radius:6px;}
  .sheet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;}
  .stat-box{border:2px solid var(--line-2);border-radius:12px;padding:8px 6px 6px;text-align:center;background:#fff;}
  .stat-box .label{display:block;margin-bottom:3px;}
  .stat-box input{width:64px;border:none;outline:none;text-align:center;font-family:var(--display);font-size:26px;color:var(--pink-deep);background:none;}
  .stat-box .st-stars{font-size:12px;color:var(--lav);letter-spacing:2px;min-height:16px;}
  .sheet-port{width:130px;height:130px;border-radius:999px;border:3px dashed var(--line-2);background:#fdf8fe center/cover no-repeat;display:grid;place-items:center;color:var(--muted);font-size:12px;cursor:pointer;text-align:center;flex:0 0 auto;}
  .sheet-banner{height:110px;border-radius:12px;border:3px dashed var(--line-2);background:#fdf8fe center/cover no-repeat;display:grid;place-items:center;color:var(--muted);font-size:12px;cursor:pointer;}
  /* ---- my designs ---- */
  .dg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
  .dg-thumb{aspect-ratio:1;background:#f1e9fa center/cover no-repeat;display:grid;place-items:center;font-size:26px;border-radius:12px 12px 0 0;}
  .fact-row{display:flex;gap:8px;align-items:baseline;padding:4px 0;border-bottom:1px dashed var(--line);font-size:12.5px;}
  .fact-row b{flex:0 0 110px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
  /* ---- freeform ref board (per character) ---- */
  .mb-board{position:relative;background:#fbf7fd;border:1px solid var(--line);border-radius:14px;overflow:hidden;height:520px;background-image:radial-gradient(#ecdcf3 1px,transparent 1px);background-size:22px 22px;}
  .mb-card{position:absolute;border-radius:12px;box-shadow:0 4px 14px rgba(140,90,150,.18);border:1px solid var(--line);background:#fff;touch-action:none;cursor:grab;overflow:hidden;}
  .mb-card:active{cursor:grabbing;}
  .mb-card.img{background-size:cover;background-position:center;}
  .mb-card.note{background:#fff7da;border-color:#f0e3a8;}
  .mb-card.note textarea{width:100%;height:100%;border:none;background:none;resize:none;outline:none;padding:9px;font:inherit;font-size:12.5px;color:#5a5230;cursor:text;}
  .mb-card.swatch{display:flex;align-items:flex-end;justify-content:center;}
  .mb-card .mb-x{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:7px;width:20px;height:20px;cursor:pointer;font-size:11px;line-height:1;opacity:0;transition:opacity .12s;}
  .mb-card:hover .mb-x{opacity:1;}
  .mb-card .mb-rz{position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize;color:#c0a9ce;font-size:11px;display:grid;place-items:center;}
  .mb-card .mb-hex{background:rgba(0,0,0,.4);color:#fff;font-size:10px;padding:2px 6px;border-radius:6px;margin-bottom:5px;cursor:pointer;}
  /* ---- floating sticky notes ---- */
  #stickyLayer{position:fixed;inset:0;z-index:80;pointer-events:none;}

function ocById(id){ return (SENT.ocs||[]).find(o=>o.id===id); }
function ocGrad(o){ const p=(o&&o.palette&&o.palette.length)?o.palette:["#f49fc6","#a795e6"]; return `linear-gradient(135deg,${p[0]},${p[1]||p[0]})`; }
/* avatar: real profile picture when set, palette-gradient emoji otherwise */
function avaHTML(o,size,fs){ const st=`width:${size}px;height:${size}px;font-size:${fs}px;`;
  if(o&&o.pfp) return `<span class="oc-ava" style="${st}background:url('${esc(o.pfp)}') center/cover no-repeat #fdf6fb"></span>`;
  return `<span class="oc-ava" style="${st}background:${ocGrad(o)}">${o?(o.emoji||"🎭"):"?"}</span>`; }
function ocChip(id){ const o=ocById(id); return o?`<span class="pill pill-lav" title="${esc(o.name)}">${o.emoji||"🎭"} ${esc(o.name)}</span>`:""; }
function shipPill(t){ return {romance:"pill-pink",friends:"pill-mint",rivals:"pill-peach",family:"pill-blue","found family":"pill-blue",enemies:"pill-gray",mentor:"pill-lav",complicated:"pill-lav"}[t]||"pill-gray"; }

/* ===================== MODULAR PAGE ENGINE (ported) ===================== */
function layoutFor(tab){ const L=(SENT.ocLayouts&&SENT.ocLayouts[tab])||{}; return {order:L.order||[],size:L.size||{},min:L.min||{},hidden:L.hidden||{}}; }
function modularPage(tab, labels, items, defCols){
  const L=layoutFor(tab), map=Object.fromEntries(items);
  let order=L.order.length?L.order.filter(k=>map[k]!=null):[];
  items.forEach(it=>{ if(!order.includes(it[0]))order.push(it[0]); });
  const sz=k=>{ const r=L.size[k]; return (typeof r==="number")?{c:r}:(r||{}); };
  const dc=k=>{ if(defCols&&typeof defCols==="object") return defCols[k]||defCols._||6; return defCols||(items.length<=2?12:6); };
  const cells=order.filter(k=>!L.hidden[k]).map(k=>{ const s=sz(k), cols=Math.max(3,s.c||dc(k)), min=!!L.min[k];
    return `<div class="home-widget ${min?'min':''}" data-w="${k}" data-h="${s.h||''}" data-c="${cols}" style="grid-column:span ${cols}">
      <div class="home-tools"><button class="home-grip" title="drag to move">⠿</button><button data-act="homeMin" data-w="${k}" title="${min?'expand':'minimize'}">${min?'＋':'–'}</button><button data-act="homeHide" data-w="${k}" title="remove">✕</button></div>
      <span class="home-resize" title="drag to resize ⤡">⤡</span>${map[k]}</div>`; }).join("");
  const hiddenN=Object.keys(L.hidden).filter(k=>L.hidden[k]&&map[k]).length;
  return `<div class="grid-modular" data-tab="${tab}" data-labels="${esc(JSON.stringify(labels))}">${cells}<button class="home-add" data-act="manageCards">＋ cards${hiddenN?` · ${hiddenN} hidden`:""}</button></div>`;
}
/* JS masonry: pack each widget's row-span to its content so there are no gaps */
function layoutHome(){
  const grid=document.querySelector(".grid-modular"); if(!grid)return;
  const rowH=8, gap=16;
  const colCount=(((getComputedStyle(grid).gridTemplateColumns)||"").match(/\S+/g)||[]).length||1;
  grid.querySelectorAll(".home-widget").forEach(w=>{
    if(w.classList.contains("resizing"))return;
    const want=parseInt(w.dataset.c||"0")||colCount;
    let span=Math.max(1,Math.min(want,colCount));
    if(colCount<=9 && span>colCount/2) span=colCount;   // iPad-portrait centering fix — keep
    const cur=/span (\d+)/.exec(w.style.gridColumn||"");
    if(!cur||+cur[1]!==span) w.style.gridColumn="span "+span;
  });
  grid.querySelectorAll(".home-widget").forEach(w=>{ const panel=w.querySelector(".panel,section")||w.lastElementChild; if(!panel)return;
    let h;
    if(w.classList.contains("min")){ h=50; }
    else { const sh=parseFloat(w.dataset.h||"0")||0; panel.style.minHeight=sh?sh+"px":""; h=panel.getBoundingClientRect().height; }
    if(h>0)w.style.gridRowEnd="span "+Math.max(2,Math.ceil((h+gap)/rowH));
  });
}

  try{ cv.toBlob(b=>{ if(!b){ toast("Couldn't make the PNG 🌸"); return; } const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=((o&&o.name)||"ref-board").toLowerCase().replace(/\s+/g,"-")+"-board.png"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1500); toast(failed?("Saved 🎨 — "+failed+" image"+(failed>1?"s":"")+" couldn't embed (that site blocks it)"):"Board saved as PNG 🎨"); },"image/png"); }
  catch(err){ toast("Some images block PNG export — uploads always work 🌸"); }
}
function randHex(){ const h=Math.floor(Math.random()*360), s=42+Math.random()*42, l=44+Math.random()*26;
  const c=(1-Math.abs(2*l/100-1))*s/100, x=c*(1-Math.abs((h/60)%2-1)), m=l/100-c/2; let r,g,b;
  if(h<60){r=c;g=x;b=0;}else if(h<120){r=x;g=c;b=0;}else if(h<180){r=0;g=c;b=x;}else if(h<240){r=0;g=x;b=c;}else if(h<300){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
  const t=v=>("0"+Math.round((v+m)*255).toString(16)).slice(-2); return "#"+t(r)+t(g)+t(b); }

function exportData(){
  const keys=["ocs","ocLore","ocShips","ocArcs","ocIdeas","ocInspo","ocRpInfo","ocJournals","ocDesigns","ocStickies","ocLayouts","ocAppConfig"];
  const out={}; keys.forEach(k=>{ if(SENT[k]!=null)out[k]=SENT[k]; });
  const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=u; a.download="oc-hub-backup-"+TODAY+".json";
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1200); toast("Backup downloaded 💾");
}

/* ===================== EVENTS (one dispatcher for everything) ===================== */
const WRITE_ACTS=["addOC","saveOC","delOC","editOC","mbAddImage","mbAddNote","mbAddColor","mbDel","mbUpload","loreNew","saveLore","loreDel","loreEdit","loreLink","addArc","arcStage","arcLink","beatAdd","beatDone","beatDel","arcDel","shipNew","saveShip","shipEdit","shipDel","ocIdeaAdd","ocIdeaDel","ideaToArc","ocInspoAdd","ocInspoDel","ocInspoDone","homeIdeaAdd","homeMin","homeHide","cardToggle","resetLayout","saveConfig","addSticky","delSticky","stickyColor","triviaAdd","triviaDel","ownAdd","ownDel","galAddUrl","galDel","galUpload","setPfp","setBanner","galDelG","pfpUpload","pfpClear","sheetPfp","sheetBanner","rpSave","jrNew","jrEdit","jrLink","saveJr","jrDel","dgNew","dgEdit","dgUpload","dgMultiUpload","dgCover","dgImgDel","saveDg","dgDel","dgPromote","restoreBackup"];
document.addEventListener("click",async(e)=>{
  const el=e.target.closest("[data-act]"); if(!el)return; const act=el.dataset.act, id=el.dataset.id;
  if(RO && WRITE_ACTS.includes(act)){ toast("Demo mode — connect Supabase to save 🌸"); return; }
  if(act==="tab")return setTab(el.dataset.tab);
  if(act==="goTab"){ if(el.dataset.tab&&TABS.some(t=>t[0]===el.dataset.tab)) setTab(el.dataset.tab); return; }
  if(act==="goSettings")return setTab("settings");
  if(act==="closeModal"){ if(e.target===el){closeModal();render();} return; }
  if(act==="copyText"){ if(navigator.clipboard)navigator.clipboard.writeText(el.dataset.t); toast("Copied 💗"); return; }

  /* characters */
  if(act==="addOC"){ _sheetPrefill=null; state.editOC="new"; state.selOC=null; state.tab="chars"; return render(); }
  if(act==="openOC"){ state.selOC=id; state.editOC=null; state.tab="chars"; return render(); }
  if(act==="backToChars"){ state.selOC=null; state.editOC=null; return render(); }
  if(act==="editOC"){ state.editOC=id; return render(); }
  if(act==="sheetCancel"){ _pend={}; _sheetPrefill=null; state.editOC=null; return render(); }
  if(act==="sheetPfp"){ const f=document.getElementById("sheetPfpFile"); if(f){f.value="";f.click();} return; }
  if(act==="sheetBanner"){ const f=document.getElementById("sheetBannerFile"); if(f){f.value="";f.click();} return; }
  if(act==="saveOC")return saveOCFromModal();
  if(act==="delOC"){ if(!confirm("Delete this character? Their lore links, ships and arcs stay (unlinked)."))return;
    await ocMut("ocs",a=>a.filter(x=>x.id!==id));
    await ocMut("ocShips",a=>a.filter(s=>s.aId!==id&&s.bId!==id));
    await ocMut("ocLore",a=>a.map(l=>({...l,linkedOcIds:(l.linkedOcIds||[]).filter(x=>x!==id)})));
    await ocMut("ocArcs",a=>a.map(x=>({...x,ocIds:(x.ocIds||[]).filter(y=>y!==id)})));
    state.selOC=null; toast("Gone, gently 🕊️"); return render(); }

  /* ref board */
  if(act==="mbAddImage"){ const i=document.getElementById("mbImgUrl"); const u=(i&&i.value||"").trim(); if(!u){toast("Paste an image URL 🌸");return;} const ox=24+Math.floor(Math.random()*60), oy=24+Math.floor(Math.random()*50); await refMut(r=>[...r,{id:uid(),type:"img",url:u,x:ox,y:oy,w:180,h:180}]); return render(); }
  if(act==="mbAddNote"){ const ox=30+Math.floor(Math.random()*60), oy=30+Math.floor(Math.random()*50); await refMut(r=>[...r,{id:uid(),type:"note",text:"",x:ox,y:oy,w:170,h:120}]); return render(); }
  if(act==="mbAddColor"){ const o=ocById(state.selOC); const col=(o&&o.palette&&o.palette[0])||randHex(); const ox=40+Math.floor(Math.random()*60), oy=40+Math.floor(Math.random()*50); await refMut(r=>[...r,{id:uid(),type:"swatch",color:col,x:ox,y:oy,w:92,h:92}]); return render(); }
  if(act==="mbDel"){ await refMut(r=>r.filter(c=>c.id!==id)); return render(); }
  if(act==="mbUpload"){ const f=document.getElementById("mbFile"); if(f){ f.value=""; f.click(); } return; }
  if(act==="mbExport"){ try{ await exportBoardPNG(); }catch(err){ toast("Export hiccuped 🌸"); } return; }

  /* trivia · gallery · ownership log (on the open character) */
  if(act==="triviaAdd"){ const i=document.getElementById("triviaText"); const t=(i&&i.value||"").trim(); if(!t)return; await ocPatch(state.selOC,o=>({...o,trivia:[...(o.trivia||[]),{id:uid(),text:t,date:TODAY}]})); toast("Fact filed ✨"); return render(); }
  if(act==="triviaDel"){ await ocPatch(state.selOC,o=>({...o,trivia:(o.trivia||[]).filter(t=>t.id!==id)})); return render(); }
  if(act==="ownAdd"){ const i=document.getElementById("ownText"); const t=(i&&i.value||"").trim(); if(!t)return; await ocPatch(state.selOC,o=>({...o,ownLog:[...(o.ownLog||[]),{id:uid(),text:t,date:TODAY}]})); toast("Logged 🧾"); return render(); }
  if(act==="ownDel"){ await ocPatch(state.selOC,o=>({...o,ownLog:(o.ownLog||[]).filter(t=>t.id!==id)})); return render(); }
  if(act==="galAddUrl"){ const u=((document.getElementById("galUrl")||{}).value||"").trim(); const artist=((document.getElementById("galArtist")||{}).value||"").trim(); if(!u){toast("Paste an image URL 🌸");return;} await ocPatch(state.selOC,o=>({...o,gallery:[...(o.gallery||[]),{id:uid(),url:u,artist,date:TODAY}]})); toast("Art shelved 🖼️"); return render(); }
  if(act==="galDel"){ await ocPatch(state.selOC,o=>({...o,gallery:(o.gallery||[]).filter(g=>g.id!==id)})); return render(); }
  if(act==="galUpload"){ const f=document.getElementById("galFile"); if(f){ f.value=""; f.click(); } return; }
  if(act==="galFilter"){ state.galOC=el.dataset.v; return render(); }
  if(act==="galView")return galViewModal(el.dataset.oc,id);
  if(act==="setPfp"){ const oc=el.dataset.oc; const o=ocById(oc); const g=o&&(o.gallery||[]).find(x=>x.id===id); if(g){ await ocPatch(oc,x=>({...x,pfp:g.url})); toast("Profile pic set ⭐"); } closeModal(); return render(); }
  if(act==="setBanner"){ const oc=el.dataset.oc; const o=ocById(oc); const g=o&&(o.gallery||[]).find(x=>x.id===id); if(g){ await ocPatch(oc,x=>({...x,banner:g.url})); toast("Banner set 🖼️"); } closeModal(); return render(); }
  if(act==="galDelG"){ const oc=el.dataset.oc; await ocPatch(oc,x=>({...x,gallery:(x.gallery||[]).filter(g=>g.id!==id)})); closeModal(); toast("Deleted"); return render(); }
  if(act==="pfpUpload"){ const f=document.getElementById("pfpFile"); if(f){ f.value=""; f.click(); } return; }
  if(act==="pfpClear"){ await ocPatch(state.selOC,x=>({...x,pfp:""})); toast("Back to the emoji gumball 🦄"); return render(); }

  /* lore */
  if(act==="loreNew"){ _loreLinks=[]; return loreModal(null); }

/* ===== kanban: touch/pencil ghost drag (HTML5 DnD doesn't fire on touch) ===== */
(function(){
  let TD=null, swallowClick=false;
  document.addEventListener("pointerdown",e=>{ if(e.pointerType==="mouse"||RO)return; const k=e.target.closest('[data-act="dragArc"]'); if(!k)return; TD={id:k.dataset.id,el:k,sx:e.clientX,sy:e.clientY,moved:false,ghost:null}; },true);
  document.addEventListener("pointermove",e=>{ if(!TD||e.pointerType==="mouse")return; const dx=e.clientX-TD.sx,dy=e.clientY-TD.sy;
    if(!TD.moved){ if(Math.abs(dx)+Math.abs(dy)<8)return; TD.moved=true; const r=TD.el.getBoundingClientRect(); const g=TD.el.cloneNode(true); g.classList.add("drag-ghost"); g.style.cssText="position:fixed;left:0;top:0;z-index:9998;pointer-events:none;opacity:.85;box-shadow:0 8px 22px rgba(110,80,120,.35);width:"+r.width+"px;"; TD.ox=e.clientX-r.left; TD.oy=e.clientY-r.top; document.body.appendChild(g); TD.ghost=g; try{TD.el.setPointerCapture(e.pointerId);}catch(er){} }
    e.preventDefault(); TD.ghost.style.transform="translate("+(e.clientX-TD.ox)+"px,"+(e.clientY-TD.oy)+"px)";
    document.querySelectorAll(".drop-hot").forEach(x=>x.classList.remove("drop-hot"));
    const elp=document.elementFromPoint(e.clientX,e.clientY); const tg=elp&&elp.closest('[data-act="dropArcStage"]'); if(tg)tg.classList.add("drop-hot"); },true);
  document.addEventListener("pointerup",async e=>{ if(!TD||e.pointerType==="mouse")return; const d=TD; TD=null; if(d.ghost)d.ghost.remove(); document.querySelectorAll(".drop-hot").forEach(x=>x.classList.remove("drop-hot")); if(!d.moved)return; swallowClick=true; setTimeout(()=>swallowClick=false,350);
    const elp=document.elementFromPoint(e.clientX,e.clientY); const tg=elp&&elp.closest('[data-act="dropArcStage"]'); if(tg){ try{ await arcMutOne(d.id,a=>({...a,stage:tg.dataset.stage})); render(); }catch(er){console.error(er);} } },true);
  document.addEventListener("pointercancel",()=>{ if(!TD)return; if(TD.ghost)TD.ghost.remove(); document.querySelectorAll(".drop-hot").forEach(x=>x.classList.remove("drop-hot")); TD=null; },true);
  document.addEventListener("click",e=>{ if(swallowClick){ e.stopPropagation(); e.preventDefault(); swallowClick=false; } },true);
})();

/* ===== ref board: freeform drag + resize of cards (Milanote-style, ported) ===== */
(function(){
  let mbDrag=null, mbRz=null;
  document.addEventListener("pointerdown",e=>{
    if(RO)return;
    const rzh=e.target.closest("[data-mbrz]");
    if(rzh){ const card=rzh.closest(".mb-card"); if(!card)return; mbRz={id:rzh.getAttribute("data-mbrz"),card,sx:e.clientX,sy:e.clientY,w:card.offsetWidth,h:card.offsetHeight}; try{rzh.setPointerCapture(e.pointerId);}catch(_){}; e.preventDefault(); e.stopPropagation(); return; }
    if(e.target.closest("textarea,button,.mb-hex"))return;
    const card=e.target.closest(".mb-card"); if(!card)return;
    const board=document.getElementById("ocBoard"); if(!board)return; const br=board.getBoundingClientRect(), cr=card.getBoundingClientRect();
    mbDrag={id:card.getAttribute("data-mb"),card,br,ox:e.clientX-cr.left,oy:e.clientY-cr.top};
    card.style.zIndex=60; try{card.setPointerCapture(e.pointerId);}catch(_){}; e.preventDefault();
  },true);
  document.addEventListener("pointermove",e=>{
    if(mbRz){ const w=Math.max(56,mbRz.w+(e.clientX-mbRz.sx)), h=Math.max(44,mbRz.h+(e.clientY-mbRz.sy)); mbRz.card.style.width=w+"px"; mbRz.card.style.height=h+"px"; return; }
    if(!mbDrag)return; let x=e.clientX-mbDrag.br.left-mbDrag.ox, y=e.clientY-mbDrag.br.top-mbDrag.oy; x=Math.max(0,Math.min(x,mbDrag.br.width-28)); y=Math.max(0,Math.min(y,mbDrag.br.height-18)); mbDrag.card.style.left=x+"px"; mbDrag.card.style.top=y+"px";

/* ===== modular drag-reorder + resize: iOS-style lift, follow, slide, settle (ported verbatim) ===== */
(function(){
  let d=null, sc=false, rafL=0;
  const gridEl=()=>document.querySelector(".grid-modular");
  function maxCols(){ const g=gridEl(); return g?Math.max(3,Math.min(16,Math.floor(g.clientWidth/88))):3; }
  function relayoutSoon(){ if(rafL)return; rafL=requestAnimationFrame(()=>{ rafL=0; try{layoutHome();}catch(_){} }); }
  function commitTabs(order){ try{ localStorage.setItem("oc-tab-order",JSON.stringify(order)); }catch(e){} }
  function gtab(el){ const g=el&&el.closest&&el.closest(".grid-modular"); return g?g.dataset.tab:"home"; }
  function commitWidgetOrder(c,order){ setLayout(c.dataset.tab||"home",L=>{L.order=order;}).catch(()=>{}); }
  function commitWidgetSize(item,key,val){ setLayout(gtab(item),L=>{L.size=Object.assign({},L.size,{[key]:val});}).catch(()=>{}); }
  function moveGhost(x,y,scale){ if(d&&d.ghost)d.ghost.style.transform="translate("+(x-d.gx)+"px,"+(y-d.gy)+"px) scale("+(scale||1.04)+")"; }
  function flipReorder(c, mutate){
    const kids=[...c.children], firsts=kids.map(k=>k.getBoundingClientRect());
    mutate(); try{layoutHome();}catch(_){}
    kids.forEach((k,i)=>{ if(k===(d&&d.item))return; const a=firsts[i], b=k.getBoundingClientRect(), dx=a.left-b.left, dy=a.top-b.top; if(!dx&&!dy)return; k.style.transition="none"; k.style.transform="translate("+dx+"px,"+dy+"px)"; requestAnimationFrame(()=>{ k.style.transition=""; k.style.transform=""; }); });
  }
  document.addEventListener("pointerdown",e=>{
    if(RO||document.body.classList.contains("locked"))return;
    const rez=e.target.closest(".home-resize");
    if(rez){ const item=rez.closest(".home-widget"); if(item){ const r=item.getBoundingClientRect(), cur=parseInt(((item.style.gridColumn||"").match(/span (\d+)/)||[])[1]||"1"), panel=item.querySelector(".panel,section"), startH=panel?panel.getBoundingClientRect().height:160; d={mode:"resize",item,panel,key:item.getAttribute("data-w"),startW:r.width,startCols:cur,cols:cur,startH,h:startH,sx:e.clientX,sy:e.clientY,moved:false,cap:rez,pid:e.pointerId}; try{rez.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); } return; }
    const grip=e.target.closest(".home-grip");
    if(grip){ const item=grip.closest(".home-widget"), c=item&&item.parentElement; if(item&&c){ d={mode:"order",item,c,itemSel:".home-widget",key:"data-w",horiz:false,sx:e.clientX,sy:e.clientY,moved:false,cap:grip,pid:e.pointerId}; try{grip.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); } return; }
    const tab=e.target.closest("#nav .tab");
    if(tab){ const c=tab.parentElement; d={mode:"order",item:tab,c,itemSel:".tab",key:"data-tab",commit:commitTabs,horiz:true,sx:e.clientX,sy:e.clientY,moved:false,cap:tab,pid:e.pointerId}; try{tab.setPointerCapture(e.pointerId);}catch(_){} }
  },true);
  document.addEventListener("pointermove",e=>{
    if(!d)return;
    if(!d.moved){ if(Math.abs(e.clientX-d.sx)+Math.abs(e.clientY-d.sy)<6)return; d.moved=true;
      if(d.mode==="resize"){ d.item.classList.add("resizing"); }
      else { const r=d.item.getBoundingClientRect(); d.gx=d.sx-r.left; d.gy=d.sy-r.top; const g=d.item.cloneNode(true); g.classList.add("drag-clone"); g.classList.remove("reordering","dragsrc"); g.style.width=r.width+"px"; g.style.height=r.height+"px"; g.querySelectorAll(".home-tools,.home-resize").forEach(x=>x.remove()); document.body.appendChild(g); d.ghost=g; d.item.classList.add("dragsrc"); moveGhost(d.sx,d.sy); }
    }
    e.preventDefault();
    if(d.mode==="resize"){ const unit=d.startW/d.startCols||d.startW; let nc=Math.round((d.startW+(e.clientX-d.sx))/unit); nc=Math.max(3,Math.min(maxCols(),nc)); if(nc!==d.cols){ d.cols=nc; d.item.style.gridColumn="span "+nc; d.item.dataset.c=nc; } const nh=Math.max(120,Math.round(d.startH+(e.clientY-d.sy))); d.h=nh; if(d.panel)d.panel.style.minHeight=nh+"px"; d.item.dataset.h=nh; relayoutSoon(); return; }   /* dataset.c sync = the resize-persistence fix */
    moveGhost(e.clientX,e.clientY);
    const el=document.elementFromPoint(e.clientX,e.clientY), over=el&&el.closest(d.itemSel);
    if(over&&over!==d.item&&over.parentElement===d.c){ const r=over.getBoundingClientRect(), before=d.horiz?(e.clientX<r.left+r.width/2):(e.clientY<r.top+r.height/2); const ref=before?over:over.nextSibling; if(ref!==d.item){ flipReorder(d.c, ()=>d.c.insertBefore(d.item, ref)); } }
  },true);
  document.addEventListener("pointerup",()=>{
    if(!d)return; const x=d; d=null;
    try{x.cap.releasePointerCapture(x.pid);}catch(_){}
    if(x.mode==="resize"){ x.item.classList.remove("resizing"); if(x.moved){ sc=true; setTimeout(()=>sc=false,350); commitWidgetSize(x.item,x.key,{c:x.cols,h:Math.round(x.h)}); try{layoutHome();}catch(_){} } return; }
    if(!x.moved){ return; }
    sc=true; setTimeout(()=>sc=false,350);
    const fr=x.item.getBoundingClientRect();
    if(x.ghost){ x.ghost.style.transition="transform .2s cubic-bezier(.2,.8,.25,1),opacity .2s"; x.ghost.style.transform="translate("+fr.left+"px,"+fr.top+"px) scale(1)"; x.ghost.style.opacity="0"; const gh=x.ghost; setTimeout(()=>{ gh&&gh.remove(); },220); }
    x.item.classList.remove("dragsrc");
    const ord=[...x.c.querySelectorAll(x.itemSel)].map(it=>it.getAttribute(x.key));
    if(x.itemSel===".tab"){ commitTabs(ord); } else { commitWidgetOrder(x.c,ord); try{layoutHome();}catch(_){} }
  },true);
  document.addEventListener("pointercancel",()=>{ if(!d)return; if(d.ghost)d.ghost.remove(); if(d.item){d.item.classList.remove("dragsrc","resizing","reordering");} d=null; },true);
  document.addEventListener("click",e=>{ if(sc){ e.stopPropagation(); e.preventDefault(); sc=false; } },true);
})();

/* ===== glitter & sparkle cursor trail — twinkling stars + glitter dust ✨ ===== */
(function(){
  const reduce=()=>{ try{ return document.body.classList.contains("calm")||matchMedia("(prefers-reduced-motion:reduce)").matches; }catch(e){ return false; } };
  let last=0, count=0; const MAX=110;                  // aggressive mode ✨
  /* princess sparkles ✨ — mostly white with the faintest champagne/pearl tints, like old-Disney pixie dust */
  const STAR_COLS=["#ffffff","#ffffff","#ffffff","#fffdf4","#fff8e1","#fdf6ff"];
  const DUST_COLS=["#ffffff","#ffffff","#fffdf4","#fdf9ff"];
  function spawn(x,y){
    if(reduce()||count>=MAX)return;
    const star=Math.random()<0.5;                      // stars twinkle, dust drifts
    const p=document.createElement("div"); p.className="sparkle "+(star?"star":"dot");
    const size=star?(11+Math.random()*15):(3+Math.random()*5);
    const col=star?STAR_COLS[Math.floor(Math.random()*STAR_COLS.length)]:DUST_COLS[Math.floor(Math.random()*DUST_COLS.length)];
    p.style.width=p.style.height=size.toFixed(1)+"px";
    p.style.left=(x-size/2+(Math.random()*30-15))+"px"; p.style.top=(y-size/2+(Math.random()*30-15))+"px";
    if(star){ p.style.background=`radial-gradient(circle at 50% 50%, #ffffff 0%, ${col} 55%, ${col} 100%)`; p.style.filter=`drop-shadow(0 0 ${(5+Math.random()*7).toFixed(0)}px ${col})`; }
    else { p.style.background=col; p.style.boxShadow=`0 0 ${(7+Math.random()*10).toFixed(0)}px ${(2+Math.random()*2.4).toFixed(1)}px ${col}`; }
    p.style.setProperty("--dx",(Math.random()*70-35).toFixed(0)+"px");
    p.style.setProperty("--dy",(22+Math.random()*70).toFixed(0)+"px");
    p.style.setProperty("--dr",star?(Math.random()*300-90).toFixed(0)+"deg":"0deg");
    p.style.setProperty("--s",(0.7+Math.random()*1.0).toFixed(2));
    p.style.setProperty("--o",(0.8+Math.random()*0.2).toFixed(2));
    p.style.animation=`sparkleTwinkle ${(1.0+Math.random()*1.2).toFixed(2)}s ease-out forwards`;
    document.body.appendChild(p); count++;
    p.addEventListener("animationend",()=>{ p.remove(); count--; });
  }
  window.addEventListener("pointermove",e=>{ if(e.pointerType!=="mouse")return; const now=performance.now(); if(now-last<16)return; last=now; spawn(e.clientX,e.clientY); spawn(e.clientX,e.clientY); if(Math.random()<0.6)spawn(e.clientX,e.clientY); },{passive:true});
  /* a little burst on every click 🎉 */
  window.addEventListener("pointerdown",e=>{ if(e.pointerType!=="mouse"||reduce())return; for(let i=0;i<8;i++)spawn(e.clientX,e.clientY); },{passive:true});
})();
/* ===== ambient falling-sprinkles field — canvas behind everything 🍬 ===== */
(function(){
  const reduce=()=>{ try{ return document.body.classList.contains("calm")||matchMedia("(prefers-reduced-motion:reduce)").matches; }catch(e){ return false; } };
  const cv=document.createElement("canvas"); cv.id="sprinkleCanvas";
  cv.style.cssText="position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;";
  document.body.appendChild(cv);
  const ctx=cv.getContext("2d");
  let DPR=Math.min(2,window.devicePixelRatio||1), W=0, H=0;
  function resize(){ DPR=Math.min(2,window.devicePixelRatio||1); W=cv.width=Math.floor(innerWidth*DPR); H=cv.height=Math.floor(innerHeight*DPR); }
  resize(); addEventListener("resize",resize);
  /* pre-rendered sprinkle sprites — one glossy capsule per candy colour */
  const COLS=["#f8b8d8","#a9c8f5","#c3b2f2","#f5dd9e","#a9e3cf"];
  const sprites=COLS.map(col=>{ const c=document.createElement("canvas"); c.width=44; c.height=18; const x=c.getContext("2d");
    x.lineCap="round"; x.lineWidth=12; x.strokeStyle=col; x.beginPath(); x.moveTo(10,9); x.lineTo(34,9); x.stroke();
    x.lineCap="round"; x.lineWidth=3.5; x.strokeStyle="rgba(255,255,255,.6)"; x.beginPath(); x.moveTo(13,5.5); x.lineTo(29,5.5); x.stroke(); return c; });
  let mx=-9999,my=-9999;
  addEventListener("pointermove",e=>{ mx=e.clientX*DPR; my=e.clientY*DPR; });
  addEventListener("pointerleave",()=>{ mx=my=-9999; });
  const COUNT=(innerWidth<640?18:55), sp=[];   /* fewer sprinkles on phones = happier battery */
  function mk(seed){ return { x:Math.random()*W, y: seed? Math.random()*H : -30*DPR-Math.random()*80*DPR,
    v:(0.3+Math.random()*0.8)*DPR, rot:Math.random()*6.28, vr:(Math.random()-0.5)*0.02,
    wob:Math.random()*6.28, wobsp:0.006+Math.random()*0.016, amp:(0.25+Math.random()*0.6)*DPR,
    sc:(0.45+Math.random()*0.7)*DPR, o:0.22+Math.random()*0.4, i:Math.floor(Math.random()*sprites.length) }; }
  for(let k=0;k<COUNT;k++)sp.push(mk(true));
  const R=120;
  function loop(){
    ctx.clearRect(0,0,W,H);
    if(reduce()){ requestAnimationFrame(loop); return; }
    const Rd=R*DPR;
    for(let k=0;k<COUNT;k++){ const b=sp[k];
      b.wob+=b.wobsp; b.y+=b.v; b.x+=Math.sin(b.wob)*b.amp; b.rot+=b.vr;
      const dx=b.x-mx, dy=b.y-my, d2=dx*dx+dy*dy;
      if(d2<Rd*Rd){ const dd=Math.sqrt(d2)||1, f=(Rd-dd)/Rd*3.2*DPR; b.x+=dx/dd*f; b.y+=dy/dd*f; }
      if(b.y>H+30*DPR || b.x< -60*DPR || b.x>W+60*DPR){ const n=mk(false); Object.assign(b,n); }
      const im=sprites[b.i], w=im.width*b.sc*0.55, h=im.height*b.sc*0.55;
      ctx.save(); ctx.globalAlpha=b.o; ctx.translate(b.x,b.y); ctx.rotate(b.rot); ctx.drawImage(im,-w/2,-h/2,w,h); ctx.restore();
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();

/* ===== drag files straight in from your computer ✨ =====
   gallery (on an open character) · ref board (lands where you drop it) ·
   a design card or the design editor · the sheet's portrait/banner boxes */
(function(){
  const hasFiles=e=>{ try{ return [...((e.dataTransfer&&e.dataTransfer.types)||[])].includes("Files"); }catch(_){ return false; } };
  function dropZone(t){
    if(!t||!t.closest)return null;
    let el;
    if(el=t.closest("#sheetPort"))return {kind:"pfp",el};
    if(el=t.closest("#sheetBan"))return {kind:"banner",el};
    if(el=t.closest("#dgImgBox"))return {kind:"dgCover",el};
    if(document.getElementById("dgImgsRow")&&t.closest(".modal-bg"))return {kind:"dgFiles",el:document.getElementById("dgImgsRow").closest(".sheet-box")};
    if(el=t.closest("#ocBoard"))return {kind:"board",el};
    if(el=t.closest("[data-dgid]"))return {kind:"design",el,id:el.getAttribute("data-dgid")};
    if(state.tab==="chars"&&state.selOC&&!state.editOC){ const p=document.getElementById("galPanel"); if(p)return {kind:"gallery",el:p}; }
    return null;
  }
  document.addEventListener("dragover",e=>{
    if(!hasFiles(e))return; e.preventDefault(); try{e.dataTransfer.dropEffect="copy";}catch(_){}
    document.querySelectorAll(".file-hot").forEach(x=>x.classList.remove("file-hot"));
    const z=dropZone(e.target); if(z&&z.el)z.el.classList.add("file-hot");
  });
  document.addEventListener("dragleave",e=>{ if(!e.relatedTarget)document.querySelectorAll(".file-hot").forEach(x=>x.classList.remove("file-hot")); });
  document.addEventListener("drop",async e=>{
    if(!hasFiles(e))return; e.preventDefault();
    document.querySelectorAll(".file-hot").forEach(x=>x.classList.remove("file-hot"));
    const files=[...e.dataTransfer.files].filter(f=>/^image\//.test(f.type));
    if(!files.length){ toast("Only images can be dropped in 🌸"); return; }
    const z=dropZone(e.target);
    if(!z){ toast("Drop onto a character's gallery or board, a design, or the sheet 🌸"); return; }
    if(RO && (z.kind==="board"||z.kind==="gallery"||z.kind==="design")){ toast("Demo mode — connect Supabase to save 🌸"); return; }
    try{
      if(z.kind==="pfp"){ const {url}=await mbFileToDataURL(files[0]); _pend.pfp=url; const b=document.getElementById("sheetPort"); if(b){b.style.backgroundImage=`url('${url}')`;b.style.borderStyle="solid";b.style.color="transparent";} toast("Portrait ready — hit 💾 save"); return; }
      if(z.kind==="banner"){ const {url}=await mbFileToDataURL(files[0]); _pend.banner=url; const b=document.getElementById("sheetBan"); if(b){b.style.backgroundImage=`url('${url}')`;b.style.borderStyle="solid";b.style.color="transparent";} toast("Banner ready — hit 💾 save"); return; }
      if(z.kind==="dgCover"){ const {url}=await mbFileToDataURL(files[0]); _dgImg=url; const b=document.getElementById("dgImgBox"); if(b){b.style.backgroundImage=`url('${url}')`;b.style.borderStyle="solid";b.style.color="transparent";} toast("Cover ready — hit 💾 save"); return; }
      if(z.kind==="dgFiles"){ for(const f of files){ const {url}=await mbFileToDataURL(f); _dgImgs.push(url); } dgStrip(); toast("Added "+files.length+" file"+(files.length>1?"s":"")+" — hit 💾 save 🗂️"); return; }
      if(z.kind==="design"){ for(const f of files){ const {url}=await mbFileToDataURL(f); await ocMut("ocDesigns",a=>a.map(x=>x.id!==z.id?x:(x.img?{...x,imgs:[...(x.imgs||[]),url]}:{...x,img:url}))); } toast("Filed with the design 🗂️"); return render(); }
      if(z.kind==="board"){ const r=z.el.getBoundingClientRect(); let i=0;
        for(const f of files){ const {url,ar}=await mbFileToDataURL(f); const w=180,h=Math.max(100,Math.min(260,Math.round(180/ar)));
          const x=Math.max(0,Math.min(e.clientX-r.left-w/2+i*16,r.width-w)), y=Math.max(0,Math.min(e.clientY-r.top-h/2+i*16,r.height-h));
          await refMut(rr=>[...rr,{id:uid(),type:"img",url,x:Math.round(x),y:Math.round(y),w,h}]); i++; }
        toast("Pinned right where you dropped it 📌"); return render(); }
      if(z.kind==="gallery"){ const artist=((document.getElementById("galArtist")||{}).value||"").trim();
        for(const f of files){ const {url}=await mbFileToDataURL(f); await ocPatch(state.selOC,o=>({...o,gallery:[...(o.gallery||[]),{id:uid(),url,artist,date:TODAY}]})); }
        toast("Shelved "+files.length+" piece"+(files.length>1?"s":"")+" 🖼️"); return render(); }
    }catch(err){ console.error(err); toast("Couldn't read that image 🌸"); }
  });
})();

/* one-time migration: pull any surviving OC data off the old shared row into our own */
async function migrateFromShared(){
  if(DEMO||!SB)return;
  try{
    const cur=await DB.daily(SENTINEL);
    if(OC_KEYS.some(k=>cur[k]!=null&&(!Array.isArray(cur[k])||cur[k].length)))return;   // our row already has data
    const {data}=await SB.from("daily_logs").select("notes").eq("user_id",UID).eq("log_date",SHARED_SENTINEL).maybeSingle();
    let old={}; try{ old=data&&data.notes?JSON.parse(data.notes):{}; }catch(e){}
    const found=OC_KEYS.filter(k=>old[k]!=null);
    if(!found.length)return;
    await DB.saveDaily(SENTINEL,n=>{ const out={...n}; found.forEach(k=>{ if(out[k]==null)out[k]=old[k]; }); return out; });
    toast("Moved your hub data to its own safe shelf 📦✨");
  }catch(e){ console.error("migrate",e); }
}
applySettings();
migrateFromShared().finally(render);
if("serviceWorker" in navigator){ try{ navigator.serviceWorker.register("sw.js").catch(function(){}); }catch(e){} }

(function(){

    return "nothing matched that exactly 🌸 right now you have "+n+" character"+(n===1?"":"s")+", "+ar+" arc"+(ar===1?"":"s")+" in flight and "+idn+" parked idea"+(idn===1?"":"s")+". try a name, a tag, or a lore word!";
  }
